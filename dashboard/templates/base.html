<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueEye SOC v2 {% block title %}{% endblock %}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:       #080c18;
            --bg2:      #0c1220;
            --card:     #0f1830;
            --card2:    #13203e;
            --blue:     #2563eb;
            --cyan:     #06b6d4;
            --green:    #10b981;
            --purple:   #8b5cf6;
            --txt:      #cbd5e1;
            --dim:      #64748b;
            --muted:    #94a3b8;
            --border:   rgba(37,99,235,.18);
            --critical: #ef4444;
            --high:     #f97316;
            --medium:   #eab308;
            --low:      #10b981;
            --font-mono:'JetBrains Mono','Fira Code','Courier New',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex}

        /* NAV */
        .nav{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .nav-logo{padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
        .nav-logo-icon{width:32px;height:32px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .nav-logo-text{font-family:var(--font-mono);font-weight:700;font-size:.95rem;color:var(--txt)}
        .nav-logo-text span{color:var(--cyan)}
        .nav-links{padding:.8rem 0;flex:1}
        .nav-link{display:flex;align-items:center;gap:10px;padding:.65rem 1.4rem;font-size:.82rem;color:var(--dim);text-decoration:none;transition:all .15s;border-left:3px solid transparent}
        .nav-link:hover{color:var(--txt);background:rgba(37,99,235,.08)}
        .nav-link.active{color:var(--cyan);background:rgba(6,182,212,.08);border-left-color:var(--cyan)}
        .nav-icon{font-size:1rem;width:18px;text-align:center}
        .nav-status{padding:1rem 1.4rem;border-top:1px solid var(--border);font-size:.72rem;font-family:var(--font-mono);color:var(--dim)}
        .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:blink 2s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

        /* MAIN */
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.8rem;flex-shrink:0}
        .topbar-title{font-size:.9rem;font-weight:600;color:var(--txt)}
        .topbar-right{display:flex;align-items:center;gap:1.2rem;font-size:.75rem;font-family:var(--font-mono);color:var(--dim)}
        .content{flex:1;padding:1.8rem;overflow-y:auto}

        /* CARDS */
        .card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
        .card-header{padding:.9rem 1.3rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .card-title{font-size:.75rem;font-weight:600;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
        .card-body{padding:1.3rem}

        /* BADGES */
        .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:.67rem;font-weight:700;font-family:var(--font-mono);letter-spacing:.05em}
        .badge-CRITICAL{background:rgba(239,68,68,.15);color:var(--critical);border:1px solid rgba(239,68,68,.3)}
        .badge-HIGH{background:rgba(249,115,22,.15);color:var(--high);border:1px solid rgba(249,115,22,.3)}
        .badge-MEDIUM{background:rgba(234,179,8,.15);color:var(--medium);border:1px solid rgba(234,179,8,.3)}
        .badge-LOW{background:rgba(16,185,129,.15);color:var(--low);border:1px solid rgba(16,185,129,.3)}

        /* STATUS BADGES */
        .status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.67rem;font-weight:600;font-family:var(--font-mono)}
        .status-NEW{background:rgba(239,68,68,.15);color:#ef4444}
        .status-INVESTIGATING{background:rgba(234,179,8,.15);color:#eab308}
        .status-RESOLVED{background:rgba(16,185,129,.15);color:#10b981}
        .status-FALSE_POSITIVE{background:rgba(100,116,139,.15);color:#94a3b8}

        /* TABLE */
        table{width:100%;border-collapse:collapse}
        thead th{padding:.6rem .9rem;font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-family:var(--font-mono);text-align:left;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
        tbody tr{border-bottom:1px solid rgba(37,99,235,.07);transition:background .15s}
        tbody tr:hover{background:var(--card2)}
        tbody tr:last-child{border-bottom:none}
        td{padding:.75rem .9rem;font-size:.8rem;vertical-align:middle}

        /* MONO */
        .mono{font-family:var(--font-mono);font-size:.76rem;color:var(--muted)}
        .mitre{font-family:var(--font-mono);font-size:.68rem;background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2);padding:1px 6px;border-radius:3px}

        /* SCORE */
        .score-wrap{display:flex;align-items:center;gap:6px}
        .score-bar{width:50px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
        .score-fill{height:100%;border-radius:2px}
        .score-num{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);width:24px}

        /* BUTTON */
        .btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:5px;font-size:.75rem;cursor:pointer;font-family:var(--font-mono);border:1px solid;transition:all .15s;text-decoration:none}
        .btn-primary{background:rgba(37,99,235,.2);color:var(--cyan);border-color:rgba(37,99,235,.4)}
        .btn-primary:hover{background:rgba(37,99,235,.35)}
        .btn-ghost{background:transparent;color:var(--dim);border-color:var(--border)}
        .btn-ghost:hover{color:var(--txt);border-color:var(--muted)}

        /* STAT CARDS */
        .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:1.6rem}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.3rem;position:relative;overflow:hidden;transition:transform .2s}
        .stat-card:hover{transform:translateY(-2px)}
        .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
        .stat-total::before{background:var(--blue)}
        .stat-critical::before{background:var(--critical)}
        .stat-high::before{background:var(--high)}
        .stat-medium::before{background:var(--medium)}
        .stat-low::before{background:var(--low)}
        .stat-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-family:var(--font-mono);margin-bottom:5px}
        .stat-value{font-size:2rem;font-weight:800;font-family:var(--font-mono);line-height:1}
        .stat-total .stat-value{color:var(--cyan)}
        .stat-critical .stat-value{color:var(--critical)}
        .stat-high .stat-value{color:var(--high)}
        .stat-medium .stat-value{color:var(--medium)}
        .stat-low .stat-value{color:var(--low)}

        /* GRID */
        .two-col{display:grid;grid-template-columns:1fr 300px;gap:1.3rem}

        /* MISC */
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.6rem}
        .page-title{font-size:1.2rem;font-weight:700}
        .page-sub{font-size:.75rem;color:var(--dim);font-family:var(--font-mono);margin-top:2px}
        .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.67rem;font-family:var(--font-mono)}
        .empty{padding:2.5rem;text-align:center;color:var(--dim);font-family:var(--font-mono);font-size:.8rem}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<nav class="nav">
    <div class="nav-logo">
        <div class="nav-logo-icon">👁</div>
        <div class="nav-logo-text">Blue<span>Eye</span></div>
    </div>
    <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
            <span class="nav-icon">⚡</span> Dashboard
        </a>
        <a href="/iocs" class="nav-link {% if request.path == '/iocs' %}active{% endif %}">
            <span class="nav-icon">🔍</span> IOC Viewer
        </a>
    </div>
    <div class="nav-status">
        <span class="dot"></span>MONITORING ACTIVE<br>
        <span id="clock" style="margin-top:4px;display:block"></span>
    </div>
</nav>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">{% block topbar_title %}BlueEye SOC{% endblock %}</span>
        <div class="topbar-right">
            <span>SOC Simulator v2</span>
            <a href="/api/alerts" class="btn btn-ghost">API ↗</a>
        </div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>
<script>
    function updateClock(){
        const el=document.getElementById('clock');
        if(el) el.textContent=new Date().toISOString().replace('T',' ').substr(0,19)+' UTC';
    }
    updateClock(); setInterval(updateClock,1000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
